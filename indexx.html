<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>人生分岔路 · 情景人格问卷</title>
  <style>
    :root {
      --bg1: #1a1520;
      --bg2: #2d2435;
      --card: rgba(255, 248, 240, 0.94);
      --accent: #c45c4a;
      --accent2: #5c7c6a;
      --text: #2a2220;
      --muted: #6a5f5c;
      --choice-bg: #fff;
      --choice-border: #e8ddd4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Songti SC", "Noto Serif SC", "Georgia", serif;
      background: linear-gradient(165deg, var(--bg1) 0%, var(--bg2) 45%, #1e2a24 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow-x: hidden;
    }
    .shell {
      width: 100%;
      max-width: 520px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 1.75rem 1.5rem;
      box-shadow: 0 20px 50px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.08) inset;
      min-height: 280px;
    }
    .stage-tag {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .narrative {
      font-size: 1.05rem;
      line-height: 1.75;
      margin-bottom: 1.25rem;
      white-space: pre-wrap;
    }
    .question-illustration {
      margin: -0.3rem 0 1rem;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #eadfd6;
      background: #fffdf9;
      aspect-ratio: 4 / 3;
      display: none;
    }
    .question-illustration.show { display: block; }
    .question-illustration img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 50%;
      display: block;
    }
    /* 单题插画裁切微调：按用户反馈优化露出区域 */
    .question-illustration.question-img-q2_child_family img { object-position: center 20%; }
    .question-illustration.question-img-q3_primary_class img { object-position: center 68%; }
    .question-illustration.question-img-q5_friend_rumor img { object-position: center 26%; }
    .choices {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    button.choice {
      font-family: inherit;
      text-align: left;
      padding: 0.85rem 1rem;
      font-size: 0.95rem;
      line-height: 1.45;
      border: 1px solid var(--choice-border);
      border-radius: 10px;
      background: var(--choice-bg);
      cursor: pointer;
      transition: border-color .15s, transform .1s, box-shadow .15s;
    }
    button.choice:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 14px rgba(196, 92, 74, .12);
    }
    button.choice:active { transform: scale(0.99); }
    .progress {
      margin-top: 1.25rem;
      height: 3px;
      background: rgba(0,0,0,.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress > i {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #e8a090);
      width: 0%;
      transition: width .25s ease;
    }
    .footer-note {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,.55);
      text-align: center;
      line-height: 1.5;
    }
    .result-title {
      font-size: 1.55rem;
      margin: 0 0 0.35rem;
      color: #3d2f2a;
      text-align: center;
    }
    .result-block {
      font-size: 1rem;
      line-height: 1.8;
      color: #4a403c;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px dashed #e0d5cc;
    }
    .result-block:last-of-type { border-bottom: none; }
    .result-block h3 {
      font-size: 1.12rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin: 0 0 0.4rem;
      font-weight: 600;
    }
    .rarity-panel {
      margin-top: -0.2rem;
      margin-bottom: 0.95rem;
      border: 1px solid #ead6c3;
      border-radius: 12px;
      background: #fff7ed;
      padding: 0.8rem 0.82rem;
    }
    .rarity-line {
      font-size: 0.92rem;
      line-height: 1.55;
      color: #4a3a34;
    }
    .rarity-line strong { color: #9f4c36; }
    .rarity-tip {
      margin-top: 0.34rem;
      font-size: 0.78rem;
      color: #7b6b63;
    }
    button.restart {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.75rem;
      font-family: inherit;
      font-size: 0.9rem;
      border-radius: 10px;
      border: none;
      background: var(--accent2);
      color: #fff;
      cursor: pointer;
    }
    button.restart:hover { filter: brightness(1.08); }
    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      margin-top: 0.75rem;
    }
    button.btn-secondary {
      width: 100%;
      padding: 0.75rem;
      font-family: inherit;
      font-size: 0.9rem;
      border-radius: 10px;
      border: 1px solid #d8c9bc;
      background: #fffdf9;
      color: #4a403c;
      cursor: pointer;
    }
    button.btn-secondary:hover {
      border-color: var(--accent);
      background: #fff8f2;
    }
    .toasts {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: rgba(35, 30, 28, 0.94);
      color: #fff;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.82rem;
      animation: fadeOut 4.2s ease forwards;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
    }
    .toast.up { border-left: 4px solid #58b26d; }
    .toast.down { border-left: 4px solid #d66262; }
    .achievement-hud {
      position: fixed;
      left: 50%;
      top: 14px;
      transform: translate(-50%, -10px);
      z-index: 52;
      min-width: min(420px, calc(100vw - 28px));
      max-width: calc(100vw - 28px);
      border-radius: 12px;
      padding: 0.68rem 0.84rem 0.72rem;
      background: linear-gradient(135deg, rgba(255, 209, 95, 0.98), rgba(255, 152, 56, 0.96));
      color: #3d2607;
      border: 1px solid rgba(255, 245, 210, 0.95);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.35);
      display: none;
      align-items: center;
      gap: 0.65rem;
      pointer-events: none;
    }
    .achievement-hud.show {
      display: flex;
      animation: hudPop 1.65s ease forwards;
    }
    .achievement-hud .icon {
      width: 1.9rem;
      height: 1.9rem;
      border-radius: 999px;
      background: rgba(255, 250, 232, 0.86);
      border: 1px solid rgba(190, 110, 24, 0.35);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex: 0 0 auto;
    }
    .achievement-hud .main {
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .achievement-hud .sub {
      margin-top: 0.18rem;
      font-size: 0.73rem;
      font-weight: 600;
      color: rgba(61, 38, 7, 0.84);
      letter-spacing: 0.01em;
    }
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(12, 10, 16, 0.65);
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-mask.show { display: flex; }
    .achievement-modal {
      width: min(480px, 100%);
      background: #fff9f2;
      border-radius: 16px;
      padding: 1.2rem 1rem;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.35);
      border: 1px solid #f2dfca;
    }
    .achievement-title {
      font-size: 1.1rem;
      color: #a24b3b;
      margin-bottom: 0.45rem;
    }
    .achievement-name {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #3b302b;
    }
    #ach-desc {
      max-height: 42vh;
      overflow-y: auto;
      font-size: 0.95rem;
      line-height: 1.65;
      color: #4d423d;
    }
    .achievement-note {
      margin-top: 0.62rem;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      border: 1px solid #f0d2ad;
      background: #fff3e3;
      color: #7a4a18;
      font-size: 0.82rem;
      line-height: 1.55;
    }
    .music-toggle {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 45;
      border: none;
      border-radius: 999px;
      padding: 0.48rem 0.82rem;
      background: rgba(255, 249, 242, 0.92);
      color: #4a3b35;
      font-family: inherit;
      font-size: 0.82rem;
      box-shadow: 0 8px 20px rgba(0,0,0,.22);
      cursor: pointer;
    }
    .achievements-toggle {
      position: fixed;
      top: 14px;
      right: 112px;
      z-index: 45;
      border: none;
      border-radius: 999px;
      padding: 0.48rem 0.82rem;
      background: rgba(255, 249, 242, 0.92);
      color: #4a3b35;
      font-family: inherit;
      font-size: 0.82rem;
      box-shadow: 0 8px 20px rgba(0,0,0,.22);
      cursor: pointer;
    }
    .chapter-overlay {
      position: fixed;
      inset: 0;
      z-index: 46;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      background: radial-gradient(circle at center, rgba(20,16,30,.28), rgba(20,16,30,.55));
    }
    .chapter-overlay.show { display: flex; animation: chapterFade 0.9s ease forwards; }
    .chapter-pill {
      color: #fff8f0;
      background: rgba(35, 30, 45, 0.82);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 999px;
      padding: 0.7rem 1.1rem;
      font-size: 0.9rem;
      letter-spacing: .04em;
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
    }
    .result-hero {
      border-radius: 16px;
      padding: 1rem .9rem;
      margin-bottom: 1rem;
      color: #4a403c;
      display: grid;
      gap: .5rem;
      background: #f5fbf8;
      border: 1px solid #e0ece6;
    }
    .result-hero-kicker {
      font-size: 0.95rem;
      color: #65736c;
      text-align: center;
    }
    .result-hero-alias {
      font-size: 0.98rem;
      line-height: 1.65;
      text-align: center;
      color: #5e524b;
      margin: -0.15rem auto 0.2rem;
      max-width: 92%;
    }
    .result-hero-media {
      width: 70%;
      margin: 0 auto;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      border: 1px solid #e8ece8;
    }
    .result-hero-media img {
      display: block;
      width: 100%;
      height: auto;
      max-height: none;
      object-fit: contain;
    }
    .sticker-pack {
      border: 1px solid #eadfd6;
      border-radius: 12px;
      background: #fffdfa;
      padding: 0.72rem 0.72rem 0.8rem;
    }
    .sticker-pack img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
      border: 1px solid #eee2d8;
      background: #fff;
    }
    .badge-wall {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin-top: .35rem;
    }
    .badge-chip {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      font-size: .8rem;
      border-radius: 999px;
      padding: .24rem .55rem;
      background: #fff;
      border: 1px solid #eadbcf;
      color: #4a403c;
    }
    .ach-wall-list {
      display: flex;
      flex-direction: column;
      gap: .65rem;
      max-height: 58vh;
      overflow: auto;
      padding-right: .3rem;
    }
    .ach-row {
      border: 1px solid #ecd9cc;
      border-radius: 10px;
      padding: .55rem .65rem;
      background: #fffdf9;
    }
    .ach-row .name {
      font-size: .92rem;
      font-weight: 700;
      color: #4a3b35;
    }
    .ach-row .hint {
      font-size: .8rem;
      line-height: 1.55;
      color: #655955;
      margin-top: .25rem;
    }
    .ach-row.unlocked {
      border-color: #cde6d4;
      background: #f5fff8;
    }
    .radar-wrap {
      margin-top: .35rem;
      display: flex;
      justify-content: center;
    }
    #radar-chart {
      width: 100%;
      max-width: 350px;
      height: 260px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #f0e3d8;
    }
    @keyframes chapterFade {
      0% { opacity: 0; }
      15% { opacity: 1; }
      75% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes fadeOut {
      0% { opacity: 0; transform: translateY(8px); }
      8% { opacity: 1; transform: translateY(0); }
      82% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-8px); }
    }
    @keyframes hudPop {
      0% { opacity: 0; transform: translate(-50%, -12px) scale(0.94); }
      12% { opacity: 1; transform: translate(-50%, 0) scale(1); }
      80% { opacity: 1; transform: translate(-50%, 0) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -8px) scale(0.97); }
    }
    body.summary-screen #stat-dock,
    body.summary-screen #stat-dock-reopen { display: none; }
    body.stat-dock-collapsed #stat-dock { display: none; }
    body.stat-dock-collapsed #stat-dock-reopen { display: inline-flex; }
    .stat-dock {
      width: 100%;
      margin-top: 0.7rem;
      background: rgba(28, 22, 30, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 9px 7px;
      color: #fff8f2;
      font-size: 0.7rem;
      box-shadow: none;
      pointer-events: none;
    }
    .stat-dock-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .stat-dock-title {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      opacity: 0.9;
      margin-bottom: 0;
    }
    .stat-dock-toggle {
      pointer-events: auto;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      color: #f3ece6;
      border-radius: 999px;
      font-size: 0.6rem;
      padding: 0.12rem 0.45rem;
      line-height: 1.3;
      cursor: pointer;
      font-family: inherit;
    }
    .stat-dock-toggle:hover { background: rgba(255, 255, 255, 0.14); }
    #stat-dock-reopen {
      position: fixed;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 38;
      display: none;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(28, 22, 30, 0.9);
      color: #fff8f2;
      border-radius: 999px;
      padding: 0.38rem 0.58rem;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      font-family: inherit;
    }
    .stat-dock-log-title {
      margin-top: 7px;
      padding-top: 5px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 0.62rem;
      opacity: 0.75;
      letter-spacing: 0.08em;
    }
    .stat-row { margin-bottom: 6px; }
    .stat-row-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 3px;
    }
    .stat-row-name { font-weight: 600; }
    .stat-row-val { font-variant-numeric: tabular-nums; opacity: 0.95; }
    .stat-bar-bg {
      height: 5px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 2px;
      overflow: hidden;
    }
    .stat-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.35s ease, background 0.25s ease;
      background: #7aa68f;
    }
    .stat-row.flash .stat-bar-fill {
      filter: brightness(1.15);
    }
    .stat-dock-log {
      max-height: 72px;
      overflow: hidden;
      font-size: 0.62rem;
      line-height: 1.45;
      opacity: 0.92;
    }
    .stat-dock-log div {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stat-dock-log .pos { color: #9fe3b0; }
    .stat-dock-log .neg { color: #ffb3a7; }
    .stat-dock-log .mix { color: #f5d7b2; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card" id="app"></div>
    <aside id="stat-dock" class="stat-dock" aria-label="本局属性">
      <div class="stat-dock-head">
        <div class="stat-dock-title">本局属性</div>
        <button type="button" id="stat-dock-toggle" class="stat-dock-toggle">收起</button>
      </div>
      <div id="stat-dock-rows"></div>
      <div class="stat-dock-log-title">最近变化</div>
      <div id="stat-dock-log" class="stat-dock-log"></div>
    </aside>
    <button type="button" id="stat-dock-reopen">属性</button>
    <p class="footer-note">本页面为娱乐化情景问卷，不构成心理诊断或职业建议。敏感处境请优先寻求现实支持与专业帮助。</p>
  </div>
  <div class="toasts" id="toasts"></div>
  <div class="achievement-hud" id="achievement-hud" aria-live="polite"></div>
  <div class="modal-mask" id="achievement-mask">
    <div class="achievement-modal">
      <div class="achievement-title">成就解锁</div>
      <div class="achievement-name" id="ach-name"></div>
      <div id="ach-desc"></div>
      <button id="ach-close" style="margin-top:1rem;width:100%;padding:.7rem;border:none;border-radius:10px;background:#5c7c6a;color:#fff;font-family:inherit;cursor:pointer;">继续</button>
    </div>
  </div>
  <button id="music-toggle" class="music-toggle">BGM：开启</button>
  <button id="achievements-toggle" class="achievements-toggle">成就墙</button>
  <div id="chapter-overlay" class="chapter-overlay"><div id="chapter-pill" class="chapter-pill"></div></div>
  <div class="modal-mask" id="ach-wall-mask">
    <div class="achievement-modal">
      <div class="achievement-title">成就墙总览</div>
      <div id="ach-wall-list" class="ach-wall-list"></div>
      <button id="ach-wall-close" style="margin-top:1rem;width:100%;padding:.7rem;border:none;border-radius:10px;background:#5c7c6a;color:#fff;font-family:inherit;cursor:pointer;">关闭</button>
    </div>
  </div>
  <script src="./graph-inline.js"></script>
  <script>
    let graph = null;
    let nodesById = {};
    let stats = {};
    let flags = {};
    let counters = {};
    let history = [];
    let unlockedAchievements = [];
    let currentNodeId = null;
    let lastChapter = "";
    let progressTotalSteps = 10;
    const STAT_LABELS = {
      logic: "逻辑",
      eq: "情商",
      stress: "压力",
      discipline: "自律",
      social: "社交",
      stamina: "体力"
    };
    let audioCtx = null;
    let bgmEnabled = false;
    let bgmTimer = null;
    let currentChapterMusic = "";
    let statDockLog = [];
    let achievementHudTimer = null;
    let achievementQueue = [];
    let rarityUnlocked = false;
    const QUESTION_IMAGE_MAP = {
      q1_birth: "./assets/question-1.png",
      q2_child_family: "./assets/question-2.png",
      q3_primary_class: "./assets/question-3.png",
      q4_middle_misunderstood: "./assets/question-4.png",
      q5_friend_rumor: "./assets/question-5.png",
      q6_high_selfstudy: "./assets/question-6.png",
      q7_high_phone: "./assets/question-7.png",
      q8_college_major: "./assets/question-8.png",
      q9_college_club: "./assets/question-9.png",
      q10_college_hiking: "./assets/question-10.png",
      q10b_hiking_branch: "./assets/question-11.png",
      q11_exam_night: "./assets/question-12.png",
      q12_intern_offer: "./assets/question-13.png",
      q13_work_overtime: "./assets/question-14.png",
      q14_work_blame: "./assets/question-15.png",
      q15_work_presentation: "./assets/question-16.png",
      q16_weekend_restore: "./assets/question-17.png"
    };

    function escapeHtml(t) {
      const d = document.createElement("div");
      d.textContent = t || "";
      return d.innerHTML;
    }

    function toast(text, isUp = true) {
      const wrap = document.getElementById("toasts");
      const div = document.createElement("div");
      div.className = `toast ${isUp ? "up" : "down"}`;
      div.textContent = text;
      wrap.appendChild(div);
      setTimeout(() => div.remove(), 4400);
    }

    function showAchievementModal(ach) {
      document.getElementById("ach-name").textContent = ach.name;
      document.getElementById("ach-desc").textContent = ach.description;
      showAchievementHud(ach.name);
      document.getElementById("achievement-mask").classList.add("show");
      playCoinSound();
    }

    function showNextAchievementModal() {
      const mask = document.getElementById("achievement-mask");
      if (mask.classList.contains("show")) return;
      if (!achievementQueue.length) return;
      const ach = achievementQueue.shift();
      if (ach) showAchievementModal(ach);
    }

    function showAchievementHud(name) {
      const hud = document.getElementById("achievement-hud");
      if (!hud) return;
      hud.innerHTML = `

    function evalNodeCondition(cond) {
      if (cond.flag) return flags[cond.flag] === cond.equals;
      if (cond.counter) {
        const v = counters[cond.counter] || 0;
        if (cond.op === ">=") return v >= cond.value;
        if (cond.op === ">") return v > cond.value;
        if (cond.op === "==") return v === cond.value;
        if (cond.op === "<=") return v <= cond.value;
        if (cond.op === "<") return v < cond.value;
      }
      return true;
    }

    function nodeAllowed(node) {
      const conds = node.conditions || [];
      return conds.every(evalNodeCondition);
    }

    function evalAchievementCondition(cond) {
      if (cond.flag !== undefined && cond.equals !== undefined) {
        return flags[cond.flag] === cond.equals;
      }
      if (cond.stat) {
        const v = stats[cond.stat] || 0;
        if (cond.op === ">=") return v >= cond.value;
        if (cond.op === ">") return v > cond.value;
        if (cond.op === "==") return v === cond.value;
        if (cond.op === "<=") return v <= cond.value;
        if (cond.op === "<") return v < cond.value;
        return false;
      }
      if (cond.counter) {
        const v = counters[cond.counter] || 0;
        if (cond.op === ">=") return v >= cond.value;
        if (cond.op === ">") return v > cond.value;
        if (cond.op === "==") return v === cond.value;
        if (cond.op === "<=") return v <= cond.value;
        if (cond.op === "<") return v < cond.value;
        return false;
      }
      if (cond.node && cond.option_text_includes) {
        return history.some(
          (x) => x.node_id === cond.node && x.option_text.includes(cond.option_text_includes)
        );
      }
      return false;
    }

    function applyOption(option, nodeId) {
      const d = option.stat_changes || {};
      const changedKeys = new Set();
      Object.keys(d).forEach((k) => {
        const before = stats[k] || 0;
        stats[k] = before + d[k];
        changedKeys.add(k);
        const sign = d[k] >= 0 ? "+" : "";

        toast(`${label} ${sign}${d[k]}`, isUp);

        if (vals.every((x) => x >= 0)) cls = "pos";
        else if (vals.every((x) => x <= 0)) cls = "neg";
        const text = Object.keys(d)
          .map((k) => `${STAT_LABELS[k] || k} ${d[k] >= 0 ? "+" : ""}${d[k]}`)
          .join(" · ");
        statDockLog.unshift({ text, cls });
        statDockLog = statDockLog.slice(0, 12);
        renderStatDockLog();
      }
      renderStatDock(changedKeys);

      const fd = option.flag_changes || {};
      Object.keys(fd).forEach((k) => { flags[k] = fd[k]; });

      const cd = option.counter_changes || {};
      Object.keys(cd).forEach((k) => { counters[k] = (counters[k] || 0) + cd[k]; });

      counters.steps_taken = (counters.steps_taken || 0) + 1;

      history.push({
        node_id: nodeId,
        option_text: option.text
      });
    }

    function computeLongestStepsToTerminal(startId) {
      const memo = {};
      const visiting = new Set();
      function dfs(nodeId) {
        if (graph.terminal_nodes.includes(nodeId)) return 0;
        if (memo[nodeId] !== undefined) return memo[nodeId];
        if (visiting.has(nodeId)) return 0;
        visiting.add(nodeId);
        const node = nodesById[nodeId];
        if (!node || !(node.options || []).length) {
          visiting.delete(nodeId);
          memo[nodeId] = 0;
          return 0;
        }
        let best = 0;
        for (const op of node.options || []) {
          best = Math.max(best, dfs(op.next_id));
        }
        visiting.delete(nodeId);
        memo[nodeId] = 1 + best;
        return memo[nodeId];
      }
      return Math.max(1, dfs(startId));
    }

    function drawRadarChart() {
      const canvas = document.getElementById("radar-chart");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const labels = ["逻辑", "情商", "自律", "社交", "体力", "抗压"];
      const keys = ["logic", "eq", "discipline", "social", "stamina", "stress"];
      const values = keys.map((k) => Math.max(0, Math.min(10, (stats[k] || 0) + 3)));
      const cx = canvas.width / 2;
      const cy = canvas.height / 2 + 8;
      const radius = 86;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.lineWidth = 1;
      ctx.strokeStyle = "#e8ddd2";
      for (let r = 1; r <= 5; r++) {
        const rr = (radius * r) / 5;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = -Math.PI / 2 + (Math.PI * 2 * i) / 6;
          const x = cx + Math.cos(a) * rr;
          const y = cy + Math.sin(a) * rr;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      }
      for (let i = 0; i < 6; i++) {
        const a = -Math.PI / 2 + (Math.PI * 2 * i) / 6;
        const x = cx + Math.cos(a) * radius;
        const y = cy + Math.sin(a) * radius;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(x, y);
        ctx.stroke();
        const lx = cx + Math.cos(a) * (radius + 18);
        const ly = cy + Math.sin(a) * (radius + 18);
        ctx.fillStyle = "#5a4e49";
        ctx.font = "12px serif";
        ctx.textAlign = "center";
        ctx.fillText(labels[i], lx, ly);
      }
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = -Math.PI / 2 + (Math.PI * 2 * i) / 6;
        const rr = (radius * values[i]) / 10;
        const x = cx + Math.cos(a) * rr;
        const y = cy + Math.sin(a) * rr;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = "rgba(196, 92, 74, 0.28)";
      ctx.strokeStyle = "rgba(196, 92, 74, 0.95)";
      ctx.lineWidth = 2;
      ctx.fill();
      ctx.stroke();
    }

    function ensureAudioContext() {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return null;
        audioCtx = new Ctx();
      }
      return audioCtx;
    }

    function scheduleTone(freq, startAt, duration, gainValue, oscType = "triangle") {
      const ctx = ensureAudioContext();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = oscType;
      osc.frequency.value = freq;
      gain.gain.value = gainValue;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(startAt);
      gain.gain.setValueAtTime(gainValue, startAt);
      gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
      osc.stop(startAt + duration);
    }

    function playCoinSound() {
      const ctx = ensureAudioContext();
      if (!ctx) return;
      const t = ctx.currentTime + 0.01;
      // 复古街机感：金币上扬 + 闪光尾音，避免被误听成普通提示音
      const coinRun = [1046.5, 1318.5, 1567.98, 2093.0];
      coinRun.forEach((note, idx) => {
        scheduleTone(note, t + idx * 0.065, 0.09, 0.07, "square");
      });
      scheduleTone(2637.0, t + 0.28, 0.16, 0.05, "triangle");
      scheduleTone(3135.96, t + 0.31, 0.14, 0.035, "sine");
      scheduleTone(1760.0, t + 0.46, 0.11, 0.045, "triangle");
    }

    function chapterMusicKey() {
      const stage = (nodesById[currentNodeId]?.stage || "").trim();
      if (stage.startsWith("序章") || stage.startsWith("童年")) return "child";
      if (stage.startsWith("小学") || stage.startsWith("初中") || stage.startsWith("高中")) return "campus";
      if (stage.startsWith("大学")) return "college";
      if (stage.startsWith("职场")) return "work";
      if (stage.startsWith("终章")) return "ending";
      return "default";
    }

    function getMelodyByChapter(key) {
      const maps = {
        child: [523.25, 587.33, 659.25, 587.33, 523.25, 659.25],
        campus: [659.25, 783.99, 698.46, 659.25, 587.33, 523.25],
        college: [523.25, 659.25, 783.99, 880.0, 783.99, 659.25],
        work: [392.0, 440.0, 523.25, 440.0, 392.0, 349.23],
        ending: [659.25, 783.99, 987.77, 783.99, 659.25, 523.25],
        default: [523.25, 659.25, 783.99, 659.25]
      };
      return maps[key] || maps.default;
    }

    function playStageBgmLoop() {
      const ctx = ensureAudioContext();
      if (!ctx || !bgmEnabled) return;
      const key = chapterMusicKey();
      currentChapterMusic = key;
      const melody = getMelodyByChapter(key);
      const now = ctx.currentTime + 0.03;
      const step = 0.27;
      melody.forEach((note, i) => {
        scheduleTone(note, now + i * step, 0.22, 0.024);
      });
      bgmTimer = setTimeout(() => {
        if (bgmEnabled && currentChapterMusic === chapterMusicKey()) playStageBgmLoop();
        else if (bgmEnabled) playStageBgmLoop();
      }, 2500);
    }

    function playCuteBgmLoop() {
      playStageBgmLoop();
    }

    function toggleBgm() {
      const btn = document.getElementById("music-toggle");
      bgmEnabled = !bgmEnabled;
      if (bgmEnabled) {
        const ctx = ensureAudioContext();
        if (ctx && ctx.state === "suspended") ctx.resume();
        clearTimeout(bgmTimer);
        playCuteBgmLoop();
        btn.textContent = "BGM：关闭";
        toast("可爱BGM已开启", true);
      } else {
        clearTimeout(bgmTimer);
        btn.textContent = "BGM：开启";
        toast("BGM已关闭", false);
      }
    }

    function renderNode(nodeId) {
      const app = document.getElementById("app");
      if (graph.terminal_nodes.includes(nodeId)) {
        currentNodeId = nodeId;
        if (bgmEnabled) {
          clearTimeout(bgmTimer);
          playStageBgmLoop();
        }
        renderResult();
        return;
      }
      const node = nodesById[nodeId];
      if (!node || !nodeAllowed(node)) {
        renderResult();
        return;
      }
      document.body.classList.remove("summary-screen");
      currentNodeId = nodeId;
      if (bgmEnabled) {
        clearTimeout(bgmTimer);
        playStageBgmLoop();
      }
      showChapterOverlay(stageToChapter(node.stage || ""));
      const pct = Math.min(100, Math.round((history.length / Math.max(1, progressTotalSteps)) * 100));
      const nodeImage = QUESTION_IMAGE_MAP[node.id];
      const imageHtml = nodeImage
        ? `<div class="question-illustration show question-img-${escapeHtml(node.id)}"><img src="${encodeURI(nodeImage)}" alt="题目插画" onerror="this.parentElement.style.display='none';" /></div>`
        : "";
      app.innerHTML = `
        <div class="stage-tag">${escapeHtml(node.stage || "剧情节点")}</div>
        <div class="narrative">${escapeHtml(node.text || "")}</div>
        ${imageHtml}
        <div class="choices">
          ${(node.options || []).map((c, idx) => `<button type="button" class="choice" data-i="${idx}">${escapeHtml(c.text)}</button>`).join("")}
        </div>
        <div class="progress"><i style="width:${pct}%"></i></div>
      `;

      app.querySelectorAll(".choice").forEach((btn) => {
        btn.addEventListener("click", () => {
          if (!bgmEnabled) {
            // 用户首次交互时可安全开启音频上下文
            toggleBgm();
          }
          const idx = +btn.getAttribute("data-i");
          const option = node.options[idx];
          applyOption(option, node.id);
          checkAchievements();
          setTimeout(() => renderNode(option.next_id), 120);
        });
      });
    }

    function resetRuntime() {
      stats = {};
      flags = {};
      counters = {};
      history = [];
      unlockedAchievements = [];
      achievementQueue = [];
      lastChapter = "";
      statDockLog = [];
      (graph.state_schema.stats || []).forEach((k) => { stats[k] = 0; });
      (graph.state_schema.flags || []).forEach((k) => { flags[k] = false; });
      (graph.state_schema.counters || []).forEach((k) => { counters[k] = 0; });
    }

    function showFriendlyError() {
      const app = document.getElementById("app");
      if (!app) return;
      app.innerHTML = `<div class="stage-tag">运行异常</div><div class="narrative">哎呀，出错了，请重启试试吧~</div>`;
    }

    async function initGame() {
      const app = document.getElementById("app");
      document.body.classList.remove("summary-screen");
      app.innerHTML = `<div class="stage-tag">加载中</div><div class="narrative">正在读取题库图谱…</div>`;
      try {
        graph = window.__LIFE_PERSONALITY_GRAPH__;
        if (!graph || !graph.nodes || !Array.isArray(graph.nodes)) throw new Error("graph data missing");
      } catch (err) {
        app.innerHTML = `
          <div class="stage-tag">读取失败</div>
          <div class="narrative">哎呀，出错了，请重启试试吧~</div>
        `;
        return;
      }
      nodesById = {};
      (graph.nodes || []).forEach((n) => { nodesById[n.id] = n; });
      progressTotalSteps = computeLongestStepsToTerminal(graph.start_node);
      try {
        setStatDockCollapsed(localStorage.getItem("statDockCollapsed") === "1");
      } catch (e) {
        setStatDockCollapsed(false);
      }
      resetRuntime();
      renderStatDock(new Set());
      renderStatDockLog();
      renderNode(graph.start_node);
    }

    document.getElementById("app").addEventListener("click", async (e) => {
      if (e.target && e.target.id === "restart") {
        rarityUnlocked = false;
        resetRuntime();
        renderStatDock(new Set());
        renderStatDockLog();
        renderNode(graph.start_node);
      }
      if (e.target && e.target.id === "share-unlock") {
        await shareResultAndUnlockRarity();
      }
      if (e.target && e.target.id === "export-report") {
        exportReportMarkdown();
      }
      if (e.target && e.target.id === "export-radar-png") {
        exportRadarPng();
      }
    });
    document.getElementById("ach-close").addEventListener("click", hideAchievementModal);
    document.getElementById("achievement-mask").addEventListener("click", (e) => {
      if (e.target.id === "achievement-mask") hideAchievementModal();
    });
    document.getElementById("music-toggle").addEventListener("click", toggleBgm);
    document.getElementById("achievements-toggle").addEventListener("click", showAchievementWall);
    document.getElementById("ach-wall-close").addEventListener("click", hideAchievementWall);
    document.getElementById("ach-wall-mask").addEventListener("click", (e) => {
      if (e.target.id === "ach-wall-mask") hideAchievementWall();
    });
    document.getElementById("stat-dock-toggle").addEventListener("click", () => {
      setStatDockCollapsed(!document.body.classList.contains("stat-dock-collapsed"));
    });
    document.getElementById("stat-dock-reopen").addEventListener("click", () => {
      setStatDockCollapsed(false);
    });

    window.addEventListener("error", () => {
      showFriendlyError();
    });
    window.addEventListener("unhandledrejection", () => {
      showFriendlyError();
    });
    try {
      initGame();
    } catch (e) {
      showFriendlyError();
    }
  </script>
